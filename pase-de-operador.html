    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, query, orderBy, where } from "firebase/firestore";

        const firebaseConfig = {

        // FUNCIÓN MODIFICADA: Ahora dura 3 segundos (3000 ms)
        function showToast(message, type = 'info') {
            const toast = document.getElementById('liveToast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            const header = toast.querySelector('.toast-header');
            header.classList.remove('bg-danger', 'bg-success', 'text-white');
            if (type === 'error') header.classList.add('bg-danger', 'text-white');
            else if (type === 'success') header.classList.add('bg-success', 'text-white');
            
            // ESTA ES LA LÍNEA QUE CAMBIA: delay: 3000
            const bsToast = new bootstrap.Toast(toast, { delay: 3000 }); 
            bsToast.show();
        }

        function formatDateTime(dateTimeString, includeTime = false) {
            if (!dateTimeString) return 'N/A';
            let datePart, timePart = '';
            if (dateTimeString.includes('T')) {
                [datePart, timePart] = dateTimeString.split('T');
                timePart = timePart.substring(0, 5);
            } else {
                datePart = dateTimeString;
                timePart = '00:00';
            }
            const [year, month, day] = datePart.split('-');
            const formattedDate = `${day}/${month}/${year}`;
            if (includeTime) return `${formattedDate} ${timePart} hs`;
            return formattedDate;
        }

        async function loadExpedientesFromFirestore() {
            try {
                expedientesContainer.innerHTML = `<div class="text-center py-4"><div class="spinner-border text-primary" role=\"status\"><span class=\"visually-hidden\">Cargando...</span></div><p class=\"mt-2\">Cargando expedientes desde la nube...</p></div>`;
                const q = query(causasCollection, orderBy("fechaPase", "desc"));
                const querySnapshot = await getDocs(q);
                allExpedientes = [];
                querySnapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    allExpedientes.push({
                        id: docSnap.id,
                        numCausa: data.Causas || data.numCausa || '',
                        Causas: data.Causas || data.numCausa || '',
                        tipoProceso: data.tipoProceso || '',
                        detalleProceso: data.detalleProceso || '',
                        tipoIntervencion: data.tipoIntervencion || '',
                        operadorAsignado: data.operadorAsignado || '',
                        fechaPase: data.fechaPase || '',
                        fechaPaseOperador: data.fechaPaseOperador || '',
                        observacionesTarea: data.observacionesTarea || '',
                        timestamp: data.timestamp || new Date().toISOString()
                    });
                });
                applyFilters();
                showToast(`✅ ${allExpedientes.length} expedientes cargados`, 'success');
            } catch (error) {
                console.error("Error cargando:", error);
                expedientesContainer.innerHTML = `<div class=\"alert alert-danger text-center\">Error: ${error.message}</div>`;
                showToast("Error de conexión", "error");
            }
        }

        async function checkExpedienteExists(numCausa, excludeId = null) {
            const q = query(causasCollection, where("Causas", "==", numCausa));
            const snap = await getDocs(q);
            if (snap.empty) return false;
            if (excludeId) {
                for (const docSnap of snap.docs) {
                    if (docSnap.id !== excludeId) return true;
                }
                return false;
            }
            return true;
        }

        async function saveExpedienteData() {
            const expedienteId = document.getElementById('expedienteId').value;
            const numCausa = document.getElementById('numCausa').value.trim();
            const tipoProceso = document.getElementById('tipoProceso').value;
            const detalleProceso = document.getElementById('detalleProceso').value;
            const tipoIntervencion = document.getElementById('tipoIntervencion').value;
            const operadorAsignado = document.getElementById('operadorAsignado').value;
            const fechaPase = document.getElementById('fechaPase').value;
            const fechaPaseOperador = document.getElementById('fechaPaseOperador').value;
            const observacionesTarea = document.getElementById('observacionesTarea').value;

            if (!numCausa || !operadorAsignado || !fechaPase || !tipoProceso || !tipoIntervencion) {
                showToast('Complete todos los campos obligatorios.', 'error');
                return;
            }

            const exists = await checkExpedienteExists(numCausa, expedienteId);
            if (exists) {
                numCausaInput.classList.add('is-invalid');
                numCausaFeedback.textContent = 'Este número de expediente ya existe.';
                showToast('Número de expediente duplicado.', 'error');
                return;
            }
            numCausaInput.classList.remove('is-invalid');

            expedienteSpinner.style.display = 'inline-block';
            saveExpedienteBtn.disabled = true;

            const expedienteData = {
                Causas: numCausa,
                numCausa: numCausa,
                tipoProceso,
                detalleProceso,
                tipoIntervencion,
                operadorAsignado,
                fechaPase,
                fechaPaseOperador: fechaPaseOperador || null,
                observacionesTarea: observacionesTarea || '',
                timestamp: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            try {
                if (expedienteId) {
                    const docRef = doc(db, "causas", expedienteId);
                    await updateDoc(docRef, expedienteData);
                    showToast('¡Actualizado con éxito!', 'success');
                } else {
                    await addDoc(causasCollection, expedienteData);
                    showToast('¡Guardado con éxito!', 'success');
                }
                const modalInstance = bootstrap.Modal.getInstance(expedienteModal);
                modalInstance.hide();
                expedienteForm.reset();
                await loadExpedientesFromFirestore();
            } catch (error) {
                showToast('Error al guardar: ' + error.message, 'error');
            } finally {
                expedienteSpinner.style.display = 'none';
                saveExpedienteBtn.disabled = false;
            }
        }

        saveExpedienteBtn.addEventListener('click', saveExpedienteData);

        function resetFormForNew() {
            expedienteForm.reset();
            document.getElementById('expedienteId').value = '';
            document.getElementById('expedienteModalTitle').textContent = 'Nuevo Expediente';
            numCausaInput.classList.remove('is-invalid');
            const now = new Date();
            const local = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
            document.getElementById('fechaPase').value = local;
        }

        document.getElementById('btnCrearNuevo').addEventListener('click', () => {
            resetFormForNew();
            new bootstrap.Modal(expedienteModal).show();
        });

        function applyFilters() {
            const searchString = searchInput.value.toLowerCase();
            const expedienteString = expedienteAsignadoFilter.value.toLowerCase();
            const operador = userFilter.value;
            const tipoIntervencion = tipoIntervencionFilter.value;
            const proceso = procesoFilter.value;
            const startDate = dateFilterStart.value;
            const endDate = dateFilterEnd.value;

            filteredExpedientes = allExpedientes.filter(data => {
                const matchesSearch = !searchString || Object.values(data).some(v => v && typeof v === 'string' && v.toLowerCase().includes(searchString));
                const matchesExpediente = !expedienteString || data.numCausa.toLowerCase().includes(expedienteString);
                const matchesOperador = !operador || data.operadorAsignado === operador;
                const matchesTipoIntervencion = !tipoIntervencion || data.tipoIntervencion === tipoIntervencion;
                const matchesProceso = !proceso || data.tipoProceso === proceso;
                
                let matchesDate = true;
                if (startDate || endDate) {
                    const datePart = data.fechaPaseOperador ? data.fechaPaseOperador.split('T')[0] : null;
                    if (!datePart) matchesDate = false;
                    else {
                        if (startDate && datePart < startDate) matchesDate = false;
                        if (endDate && datePart > endDate) matchesDate = false;
                    }
                }
                return matchesSearch && matchesExpediente && matchesOperador && matchesTipoIntervencion && matchesProceso && matchesDate;
            });

            currentPage = 1;
            renderExpedientes();
            renderPagination();
            renderUserStats();
        }

        function renderExpedientes() {
            expedientesContainer.innerHTML = '';
            if (filteredExpedientes.length === 0) {
                expedientesContainer.innerHTML = '<p class="text-center text-muted mt-5">No hay resultados.</p>';
                return;
            }
            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, filteredExpedientes.length);
            const pageData = filteredExpedientes.slice(start, end);

            let html = `<div class=\"table-responsive\"><table class=\"table table-hover\"><thead class=\"table-light\"><tr>
                <th>#</th><th>Expediente</th><th>Proceso</th><th>Intervención</th><th>Operador</th><th>Fecha Pase Operador</th><th class=\"text-end\">Acciones</th>
              </tr></thead><tbody>`;
            
            pageData.forEach((data, idx) => {
                const rowNumber = filteredExpedientes.length - ((currentPage - 1) * itemsPerPage + idx);
                html += `<tr class=\"expediente-row\" data-id=\"${data.id}\">
                    <td>${rowNumber}</td>
                    <td class=\"fw-bold\">${data.numCausa}</td>
                    <td>${data.tipoProceso || 'N/A'}</td>
                    <td>${data.tipoIntervencion || 'N/A'}</td>
                    <td>${data.operadorAsignado}</td>
                    <td>${formatDateTime(data.fechaPaseOperador, true)}</td>
                    <td class=\"text-end\">
                        <button class=\"btn btn-sm btn-outline-primary view-btn\" data-id=\"${data.id}\"><i class=\"fas fa-eye\"></i></button>
                        <button class=\"btn btn-sm btn-outline-warning edit-btn\" data-id=\"${data.id}\"><i class=\"fas fa-edit\"></i></button>
                    </td>
                   </tr>`;
            });
            html += `</tbody></table></div>`;
            expedientesContainer.innerHTML = html;

            document.querySelectorAll('.view-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); viewExpediente(btn.dataset.id); }));
            document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); editExpediente(btn.dataset.id); }));
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredExpedientes.length / itemsPerPage);
            if (totalPages <= 1) { paginationContainer.innerHTML = ''; return; }
            let html = `<li class=\"page-item ${currentPage === 1 ? 'disabled' : ''}\"><a class=\"page-link\" href=\"#\" data-page=\"${currentPage-1}\">Anterior</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<li class=\"page-item ${i === currentPage ? 'active' : ''}\"><a class=\"page-link\" href=\"#\" data-page=\"${i}\">${i}</a></li>`;
            }
            html += `<li class=\"page-item ${currentPage === totalPages ? 'disabled' : ''}\"><a class=\"page-link\" href=\"#\" data-page=\"${currentPage+1}\">Siguiente</a></li>`;
            paginationContainer.innerHTML = html;
            paginationContainer.querySelectorAll('.page-link').forEach(link => link.addEventListener('click', (e) => {
                e.preventDefault();
                currentPage = parseInt(e.target.dataset.page);
                renderExpedientes(); renderPagination();
            }));
        }

        function renderUserStats() {
            const stats = {};
            filteredExpedientes.forEach(exp => { const op = exp.operadorAsignado; stats[op] = (stats[op] || 0) + 1; });
            const sorted = Object.keys(stats).sort((a,b) => stats[b]-stats[a]);
            const ctx = document.getElementById('userStatsChart').getContext('2d');
            if (userStatsChart) userStatsChart.destroy();
            userStatsChart = new Chart(ctx, {
                type: 'bar',
                data: { 
                    labels: sorted, 
                    datasets: [{ 
                        label: 'Cant.', 
                        data: sorted.map(u => stats[u]), 
                        backgroundColor: '#7b2e9f' 
                    }] 
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
            const detailsDiv = document.getElementById('statsDetails');
            let html = '<div class=\"fw-bold mb-2\">Resumen:</div>';
            sorted.forEach(op => { html += `<div class=\"d-flex justify-content-between border-bottom py-1\"><span>${op}</span><span class=\"badge bg-primary rounded-pill\">${stats[op]}</span></div>`; });
            detailsDiv.innerHTML = html;
        }

        async function editExpediente(id) {
            const data = allExpedientes.find(e => e.id === id);
            if (!data) return;
            document.getElementById('expedienteId').value = data.id;
            document.getElementById('fechaPaseOperador').value = data.fechaPaseOperador || '';
            document.getElementById('numCausa').value = data.numCausa;
            document.getElementById('tipoProceso').value = data.tipoProceso || '';
            document.getElementById('detalleProceso').value = data.detalleProceso || '';
            document.getElementById('tipoIntervencion').value = data.tipoIntervencion || '';
            document.getElementById('operadorAsignado').value = data.operadorAsignado;
            document.getElementById('observacionesTarea').value = data.observacionesTarea || '';
            document.getElementById('fechaPase').value = data.fechaPase;
            document.getElementById('expedienteModalTitle').textContent = 'Editar Expediente';
            new bootstrap.Modal(expedienteModal).show();
        }

        async function viewExpediente(id) {
            const data = allExpedientes.find(e => e.id === id);
            if (!data) return;
            const body = document.getElementById('viewExpedienteBody');
            body.innerHTML = `
                <p><strong>Causa:</strong> ${data.numCausa}</p>
                <p><strong>Operador:</strong> ${data.operadorAsignado}</p>
                <p><strong>Pase Operador:</strong> ${formatDateTime(data.fechaPaseOperador, true)}</p>
                <p><strong>Observaciones:</strong> ${data.observacionesTarea || 'Sin observaciones'}</p>
            `;
            new bootstrap.Modal(viewExpedienteModal).show();
        }

        btnSearch.addEventListener('click', applyFilters);
        btnPrintAll.addEventListener('click', () => window.print());
        document.getElementById('btnActualizar').addEventListener('click', loadExpedientesFromFirestore);

        document.addEventListener('DOMContentLoaded', () => {
            loadExpedientesFromFirestore();
            const now = new Date();
            const local = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
            document.getElementById('fechaPase').value = local;
        });
    </script>
</body>
</html>
